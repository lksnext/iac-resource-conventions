name: Feature Request
description: Propose a new capability for the Specification, an adapter, or the CLI.
title: "feat: <short description>"
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. Please only use this form for actionable,
        scoped work. For open-ended ideas or architectural discussions, use
        [GitHub Discussions](../../discussions) instead.

        If you are proposing a new Convention Pack, use the
        **Convention Pack Proposal** form instead of this one.

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Who is affected?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: >
        Describe the change. If it affects naming, tags, labels, annotations,
        metadata, or validation, explain how it fits the Specification-first
        architecture (see [AGENTS.md](../../blob/main/AGENTS.md)).
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Other approaches you considered and why you did not choose them.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Links, references, or examples from other tools, if relevant.
    validations:
      required: false

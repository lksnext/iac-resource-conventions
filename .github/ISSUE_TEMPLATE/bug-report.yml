name: Bug Report
description: Report a defect in the Specification, a Convention Pack, or an adapter.
title: "fix: <short description>"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please only use this form for
        actionable defects. For questions or architectural discussions, use
        [GitHub Discussions](../../discussions) instead.

        Do **not** use this form to report security vulnerabilities — see
        [SECURITY.md](../../security/policy) for the private reporting process.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: current-behaviour
    attributes:
      label: Current Behaviour
      description: What actually happens today.
    validations:
      required: true

  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected Behaviour
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue, including canonical input if relevant.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: >
        Affected adapter(s) (Terraform, AWS CDK, Ansible, CLI), Specification version,
        Convention Pack, OS, and any relevant tool versions.
      placeholder: e.g. Terraform adapter v0.2.0, Specification v0.3.0, macOS
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Optional. Relevant logs or error output. Redact any sensitive information.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Anything else that would help diagnose or fix the issue.
    validations:
      required: false
